server:
  port: 8082

spring:
  application:
    name: candidate-service

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

resume:
  storage:
    path: ${RESUME_STORAGE_PATH}

ai:
  provider: openai
  openai:
    api-key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL}
    url: https://api.openai.com/v1/chat/completions

services:
  interview-service:
    base-url: ${INTERVIEW_SERVICE_URL}

interview:
  pass-threshold: 70

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always